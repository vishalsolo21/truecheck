<body>

<div class="box">
  <h2>Number Checker</h2>

  <input type="number" id="mobile" placeholder="Enter Mobile Number">

  <button onclick="checkNumber()">Check</button>

  <div id="result"></div>
</div>

<script>
async function checkNumber(){

  const mobile = document.getElementById("mobile").value;
  const result = document.getElementById("result");

  if(mobile.length < 10){
    alert("Enter valid number");
    return;
  }

  result.style.display = "block";
  result.innerHTML = "Checking...";

  try{

    const response = await fetch("/api/check", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ mobile })
    });

    const data = await response.json();

    if(data.registered){
      result.style.background = "#14532d";
      result.innerHTML = "✅ Registered Number";
    }else{
      result.style.background = "#7f1d1d";
      result.innerHTML = "❌ Unregistered Number";
    }

  }catch(err){
    result.style.background = "#7f1d1d";
    result.innerHTML = "Server Error";
    console.log(err);
  }
}
</script>

</body>
</html>
