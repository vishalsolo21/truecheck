<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Swiggy Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:390px;
    background:#fff;
    border-radius:28px;
    padding:30px 24px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    font-size:48px;
    font-weight:800;
    line-height:1.1;
    color:#fc8019;
    margin-bottom:35px;
}

.inputBox{
    margin-bottom:20px;
}

input{
    width:100%;
    height:68px;
    border-radius:20px;
    border:2px solid #e5e7eb;
    padding:0 20px;
    font-size:20px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:#fc8019;
}

button{
    width:100%;
    height:66px;
    border:none;
    border-radius:20px;
    background:#fc8019;
    color:#fff;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    opacity:.95;
}

.result{
    margin-top:24px;
    padding:20px;
    border-radius:20px;
    text-align:center;
    font-size:22px;
    font-weight:700;
    display:none;
}

.success{
    background:#e8fff1;
    color:#0f9d58;
}

.error{
    background:#ffe9e9;
    color:#d93025;
}

.loading{
    background:#fff4e5;
    color:#fc8019;
}

.footer{
    margin-top:30px;
    text-align:center;
    font-size:16px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        Swiggy<br>Checker
    </div>

    <div class="inputBox">
        <input
            type="tel"
            id="number"
            maxlength="10"
            placeholder="Enter Mobile Number"
        >
    </div>

    <button onclick="checkNumber()">
        Check Number
    </button>

    <div id="result" class="result"></div>

    <div class="footer">
        Made with ❤️ by Vishal
    </div>

</div>

<script>

async function generateSignature(body){

    const encoder = new TextEncoder();

    const key = "storelex";

    const data = encoder.encode(body + key);

    const hashBuffer = await crypto.subtle.digest("SHA-256", data);

    const hashArray = Array.from(new Uint8Array(hashBuffer));

    return hashArray
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

async function checkNumber(){

    const number = document.getElementById("number").value.trim();

    const resultBox = document.getElementById("result");

    if(number.length !== 10){

        resultBox.style.display = "block";
        resultBox.className = "result error";
        resultBox.innerHTML = "⚠ Enter Valid 10 Digit Number";

        return;
    }

    resultBox.style.display = "block";
    resultBox.className = "result loading";
    resultBox.innerHTML = "⏳ Checking Number...";

    try{

        const payload = {
            type:"swiggy",
            numbers:[number],
            timestamp:Math.floor(Date.now()/1000)
        };

        const body = JSON.stringify(payload);

        const signature = await generateSignature(body);

        const response = await fetch(
            "https://storelex.store/?api=1",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "X-App-Signature":signature,
                    "Referer":"https://storelex.store/#swiggy"
                },

                body:body
            }
        );

        const data = await response.json();

        console.log(data);

        const registered =
            data?.results?.[number]?.registered;

        resultBox.style.display = "block";

        if(registered){

            resultBox.className = "result success";
            resultBox.innerHTML =
                "✅ Registered On Swiggy";

        }else{

            resultBox.className = "result error";
            resultBox.innerHTML =
                "❌ Not Registered";

        }

    }catch(err){

        console.log(err);

        resultBox.className = "result error";
        resultBox.innerHTML = "⚠ Server Error";

    }

}

</script>

</body>
</html>
