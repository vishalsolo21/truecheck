<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Swiggy Number Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:380px;
    background:#fff;
    border-radius:26px;
    padding:28px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    font-size:42px;
    font-weight:800;
    color:#fc8019;
    margin-bottom:28px;
}

.inputBox{
    margin-bottom:18px;
}

input{
    width:100%;
    height:64px;
    border-radius:18px;
    border:2px solid #e5e7eb;
    padding:0 18px;
    font-size:18px;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#fc8019;
}

button{
    width:100%;
    height:62px;
    border:none;
    border-radius:18px;
    background:#fc8019;
    color:#fff;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    opacity:.95;
}

.result{
    margin-top:22px;
    padding:18px;
    border-radius:18px;
    text-align:center;
    font-size:20px;
    font-weight:700;
    display:none;
}

.success{
    background:#e8fff1;
    color:#0f9d58;
}

.error{
    background:#ffe9e9;
    color:#d93025;
}

.loading{
    background:#fff5e6;
    color:#fc8019;
}

.footer{
    margin-top:28px;
    text-align:center;
    color:#777;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        Swiggy Checker
    </div>

    <div class="inputBox">
        <input
            type="tel"
            id="number"
            maxlength="10"
            placeholder="Enter Mobile Number"
        >
    </div>

    <button onclick="checkNumber()">
        Check Number
    </button>

    <div id="result" class="result"></div>

    <div class="footer">
        Made with ❤️ by Vishal
    </div>

</div>

<script>

async function checkNumber(){

    const number = document.getElementById("number").value.trim();

    const resultBox = document.getElementById("result");

    if(number.length !== 10){

        resultBox.style.display = "block";
        resultBox.className = "result error";
        resultBox.innerHTML = "⚠ Enter Valid 10 Digit Number";

        return;
    }

    resultBox.style.display = "block";
    resultBox.className = "result loading";
    resultBox.innerHTML = "⏳ Checking Number...";

    try{

        const response = await fetch("/api/check",{

            method:"POST",

            headers:{
                "content-type":"application/json"
            },

            body:JSON.stringify({
                mobile:number
            })

        });

        const data = await response.json();

        console.log(data);

        const exists =
            data?.data?.statusCode === 2 ||
            data?.statusCode === 2 ||
            data?.message?.toLowerCase()?.includes("exists");

        if(exists){

            resultBox.className = "result success";
            resultBox.innerHTML = "✅ Registered On Swiggy";

        }else{

            resultBox.className = "result error";
            resultBox.innerHTML = "❌ Not Registered";

        }

    }catch(err){

        console.log(err);

        resultBox.className = "result error";
        resultBox.innerHTML = "⚠ Server Error";

    }

}

</script>

</body>
</html>
