<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Checker</title>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      color:white;
    }

    .box{
      width:350px;
      background:#1e293b;
      padding:25px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      margin-bottom:15px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    #result{
      margin-top:15px;
      padding:12px;
      border-radius:8px;
      display:none;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Number Checker</h2>

  <input type="number" id="mobile" placeholder="Enter Mobile Number">

  <button onclick="checkNumber()">Check</button>

  <div id="result"></div>
</div>

<script>
async function checkNumber(){

  const mobile = document.getElementById("mobile").value;
  const result = document.getElementById("result");

  if(mobile.length < 10){
    alert("Enter valid number");
    return;
  }

  result.style.display = "block";
  result.innerHTML = "Checking...";

  try{

    const response = await fetch("/api/check", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ mobile })
    });

    const data = await response.json();

    if(data.registered){
      result.style.background = "#14532d";
      result.innerHTML = "✅ Registered Number";
    }else{
      result.style.background = "#7f1d1d";
      result.innerHTML = "❌ Unregistered Number";
    }

  }catch(err){
    result.style.background = "#7f1d1d";
    result.innerHTML = "Server Error";
    console.log(err);
  }
}
</script>

</body>
</html>
