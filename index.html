<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiggy Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:390px;
    background:#fff;
    border-radius:28px;
    padding:30px 24px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    font-size:48px;
    font-weight:800;
    color:#fc8019;
    margin-bottom:35px;
}

input{
    width:100%;
    height:68px;
    border-radius:20px;
    border:2px solid #e5e7eb;
    padding:0 20px;
    font-size:20px;
    outline:none;
}

button{
    width:100%;
    height:66px;
    border:none;
    border-radius:20px;
    background:#fc8019;
    color:#fff;
    font-size:22px;
    font-weight:700;
    margin-top:20px;
    cursor:pointer;
}

.result{
    margin-top:24px;
    padding:20px;
    border-radius:20px;
    text-align:center;
    font-size:22px;
    font-weight:700;
    display:none;
}

.success{
    background:#e8fff1;
    color:#0f9d58;
}

.error{
    background:#ffe9e9;
    color:#d93025;
}

.loading{
    background:#fff4e5;
    color:#fc8019;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        Swiggy Checker
    </div>

    <input
        type="tel"
        id="number"
        maxlength="10"
        placeholder="Enter Mobile Number"
    >

    <button onclick="checkNumber()">
        Check Number
    </button>

    <div id="result" class="result"></div>

    <div class="footer">
        Made with ❤️ by Vishal
    </div>

</div>

<script>

async function checkNumber(){

    const number =
        document.getElementById("number").value.trim();

    const resultBox =
        document.getElementById("result");

    if(number.length !== 10){

        resultBox.style.display = "block";
        resultBox.className = "result error";
        resultBox.innerHTML =
            "⚠ Enter Valid Number";

        return;
    }

    resultBox.style.display = "block";
    resultBox.className = "result loading";
    resultBox.innerHTML = "⏳ Checking...";

    try{

        const response = await fetch("/api/check",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                number:number
            })
        });

        const data = await response.json();

        console.log(data);

        if(data.registered){

            resultBox.className = "result success";
            resultBox.innerHTML =
                "✅ Registered On Swiggy";

        }else{

            resultBox.className = "result error";
            resultBox.innerHTML =
                "❌ Not Registered";

        }

    }catch(err){

        console.log(err);

        resultBox.className = "result error";
        resultBox.innerHTML =
            "⚠ Server Error";

    }

}
</script>

</body>
</html>
