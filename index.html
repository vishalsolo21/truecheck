<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Swiggy Number Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:380px;
    background:#fff;
    border-radius:18px;
    padding:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#fc8019;
    margin-bottom:25px;
}

.inputBox{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    background:#fc8019;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.95;
}

.result{
    margin-top:20px;
    padding:14px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
    display:none;
}

.success{
    background:#e7f8ec;
    color:#138a36;
}

.error{
    background:#ffe8e8;
    color:#d62828;
}

.loading{
    background:#fff4e6;
    color:#fc8019;
}
.footer{
    margin-top:18px;
    text-align:center;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">Swiggy Checker</div>

    <div class="inputBox">
        <input type="tel" id="number" placeholder="Enter Mobile Number">
    </div>

    <button onclick="checkNumber()">Check Number</button>

    <div id="result" class="result"></div>

    <div class="footer">
        Made with ❤️ by Vishal
    </div>

</div>

<script>
async function checkNumber(){

    const number = document.getElementById("number").value.trim();
    const resultBox = document.getElementById("result");

    if(number.length !== 10){
        resultBox.style.display = "block";
        resultBox.className = "result error";
        resultBox.innerHTML = "Enter valid 10 digit number";
        return;
    }

    resultBox.style.display = "block";
    resultBox.className = "result loading";
    resultBox.innerHTML = "Checking Number...";

    try{

        const response = await fetch("https://www.swiggy.com/mapi/auth/signin-check",{
            method:"POST",
            headers:{
                "content-type":"application/json"
            },
            body:JSON.stringify({
                mobile:number,
                countryCode:"+91"
            })
        });

        const data = await response.json();

        console.log(data);

        /*
            Common response examples:
            registered = true
            registered = false
        */

        if(data.registered === true){

            resultBox.className = "result success";
            resultBox.innerHTML = "✅ Registered On Swiggy";

        }else{

            resultBox.className = "result error";
            resultBox.innerHTML = "❌ Not Registered";

        }

    }catch(err){

        console.log(err);

        resultBox.className = "result error";
        resultBox.innerHTML = "⚠ Request Failed / CORS Error";

    }

}
</script>

</body>
</html>
