<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22c55e">
    <title>TrueCheck By Solo21</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    width:95%;
    max-width:600px;
    margin:20px auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:16px;
}

button{
    padding:12px 15px;
    background:#22c55e;
    color:#fff;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

#result{
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0f172a;
    border-radius:10px;
    overflow:hidden;
}

td{
    padding:12px;
    border-bottom:1px solid #334155;
    word-break:break-word;
}

td:first-child{
    width:35%;
    color:#38bdf8;
    font-weight:bold;
}

.loading{
    text-align:center;
    margin-top:15px;
}

.error{
    text-align:center;
    color:#ef4444;
}

.footer{
    margin-top:auto;
    text-align:center;
    padding:15px;
    color:#94a3b8;
}

.footer span{
    color:#22c55e;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <h1>📱TRUECHECK</h1>

        <div class="input-group">
            <input
                type="text"
                id="number"
                maxlength="10"
                placeholder="Enter 10 Digit Number">

            <button onclick="checkData()">
                SEARCH
            </button>
        </div>

        <div id="result"></div>

    </div>
</div>

<div class="footer">
    Made with ❤️ by Vishal |
    <span>RAIGANJLOOTERS</span>
</div>

<script>
async function checkData(){

    const number =
        document.getElementById("number").value.trim();

    const result =
        document.getElementById("result");

    if(!/^[0-9]{10}$/.test(number)){
        result.innerHTML =
        '<div class="error">Enter a valid 10 digit number</div>';
        return;
    }

    result.innerHTML =
    '<div class="loading">Fetching data...</div>';

    try{

        const response =
        await fetch(`/api/check?number=${number}`);

        const data =
        await response.json();

        if(!data.mobile){
            result.innerHTML =
            '<div class="error">No Data Found</div>';
            return;
        }

        result.innerHTML = `
        <table>
            <tr>
                <td>Mobile</td>
                <td>${data.mobile || "-"}</td>
            </tr>

            <tr>
                <td>Name</td>
                <td>${data.name || "-"}</td>
            </tr>

            <tr>
                <td>Father Name</td>
                <td>${data.fname || "-"}</td>
            </tr>

            <tr>
                <td>Address</td>
                <td>${data.address || "-"}</td>
            </tr>

            <tr>
                <td>Alternate</td>
                <td>${data.alt || "-"}</td>
            </tr>

            <tr>
                <td>Circle</td>
                <td>${data.circle || "-"}</td>
            </tr>

            <tr>
                <td>ID</td>
                <td>${data.id || "-"}</td>
            </tr>

            <tr>
                <td>Email</td>
                <td>${data.email || "-"}</td>
            </tr>
        </table>
        `;

    }catch(error){

        result.innerHTML =
        `<div class="error">${error.message}</div>`;
    }
}
</script>

</body>
</html>
